name: apply-on-merge
on:
  pull_request:
    types: [closed]
jobs:
  apply:
    # I3: merging a plan PR IS the approval. This workflow is the only write path.
    # ROOTSMITH_OPS gates it to the private ops fork, same as drift-nightly.
    if: vars.ROOTSMITH_OPS == 'true' && github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'runbook-plan')
    runs-on: ubuntu-latest
    environment: apply   # configure required-reviewer protection on this environment (second gate, free)
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - name: execute the plan files added by this PR
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_WRITE_TOKEN }}   # exists ONLY in the apply environment (I2)
          GITHUB_TOKEN: ${{ secrets.GH_WRITE_TOKEN }}       # PAT: plan steps create/archive repos beyond this one; github.token cannot
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          merge="${{ github.event.pull_request.merge_commit_sha }}"
          plans=$(git diff --name-only --diff-filter=A "$base" "$merge" -- 'plans/*.json')
          if [ -z "$plans" ]; then
            echo "no plan files added by this PR — nothing to apply"
            exit 0
          fi
          for f in $plans; do
            echo "== applying $f"
            npm run cli -- runbook apply "$f"
          done
